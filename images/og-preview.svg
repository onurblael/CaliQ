  <circle cx="100" cy="530" r="150" fill="#16a34a" opacity="0.06"/>

  <!-- Logo emoji + name -->
  <text x="600" y="200" font-size="72" text-anchor="middle" font-family="system-ui,sans-serif">💡</text>
